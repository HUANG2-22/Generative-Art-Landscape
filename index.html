<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Procedural Art</title>
<style>
  body { margin:0; background:#111; display:flex; justify-content:center; align-items:center; height:100vh; }
  svg { border:1px solid #333; }
</style>
</head>
<body>

<svg id="artContainer" width="800" height="600"></svg>

<script id="PRNG">
var Prng = new function() {
    this.s = 1234; this.p = 999979; this.q = 999983; this.m = this.p*this.q;
    this.hash = function(x) {
        var y = btoa(JSON.stringify(x)), z=0;
        for(var i=0;i<y.length;i++){z+=y.charCodeAt(i)*Math.pow(128,i);}
        return z;
    };
    this.seed = function(x) {
        if(x==undefined)x=new Date().getTime();
        var y=0, z=0;
        function redo(){ y=(Prng.hash(x)+z)%Prng.m; z++; }
        while(y%Prng.p==0 || y%Prng.q==0 || y==0 || y==1){redo();}
        Prng.s=y;
        for(var i=0;i<10;i++){Prng.next();}
    };
    this.next = function(){ Prng.s=(Prng.s*Prng.s)%Prng.m; return Prng.s/Prng.m; };
}();
Math.random = () => Prng.next();
Math.seed = (x) => Prng.seed(x);
</script>

<script id="PerlinNoise">
// 简化版 Perlin Noise
var Noise = new function(){
    var PERLIN_SIZE=4095, perlin_octaves=4, perlin_amp_falloff=0.5, perlin;
    var scaled_cosine=function(i){return 0.5*(1-Math.cos(i*Math.PI));};
    this.noise=function(x,y,z){y=y||0; z=z||0;
        if(perlin==null){ perlin=[]; for(var i=0;i<=PERLIN_SIZE;i++) perlin[i]=Math.random(); }
        var xi=Math.floor(x), yi=Math.floor(y), zi=Math.floor(z);
        var xf=x-xi, yf=y-yi, zf=z-zi;
        var rxf, ryf, r=0, ampl=0.5, n1,n2,n3;
        for(var o=0;o<perlin_octaves;o++){
            var of=xi+(yi<<2)+(zi<<8);
            rxf=scaled_cosine(xf); ryf=scaled_cosine(yf);
            n1=perlin[of&PERLIN_SIZE]; n1+=rxf*(perlin[(of+1)&PERLIN_SIZE]-n1);
            n2=perlin[(of+1<<2)&PERLIN_SIZE]; n2+=rxf*(perlin[((of+1<<2)+1)&PERLIN_SIZE]-n2);
            n1+=ryf*(n2-n1); r+=n1*ampl; ampl*=perlin_amp_falloff; xi<<=1; xf*=2; yi<<=1; yf*=2; zi<<=1; zf*=2;
            if(xf>=1){xi++; xf--;} if(yf>=1){yi++; yf--;} if(zf>=1){zi++; zf--;}
        } return r;
    };
}();
</script>

<script id="Util">
function mapval(value, istart, istop, ostart, ostop){return ostart + (ostop-ostart)*((value-istart)/(istop-istart));}
function loopNoise(nslist){let dif=nslist[nslist.length-1]-nslist[0]; let bds=[100,-100]; for(let i=0;i<nslist.length;i++){nslist[i]+=(dif*(nslist.length-1-i))/(nslist.length-1); if(nslist[i]<bds[0])bds[0]=nslist[i]; if(nslist[i]>bds[1])bds[1]=nslist[i];} for(let i=0;i<nslist.length;i++){nslist[i]=mapval(nslist[i],bds[0],bds[1],0,1);}}
function randChoice(arr){return arr[Math.floor(arr.length*Math.random())];}
function poly(plist,args){args=args||{}; let xof=args.xof||0, yof=args.yof||0, fil=args.fil||"rgba(0,0,0,0)", str=args.str||fil, wid=args.wid||0; let canv="<polyline points='"; for(let i=0;i<plist.length;i++){canv+=" "+(plist[i][0]+xof).toFixed(1)+","+(plist[i][1]+yof).toFixed(1);} canv+="' style='fill:"+fil+";stroke:"+str+";stroke-width:"+wid+"'/>"; return canv;}
</script>

<script id="Tree">
var Tree=new function(){
    this.tree03=function(x,y,args){args=args||{}; let hei=args.hei||50, wid=args.wid||5, col=args.col||"rgba(100,100,100,0.5)"; let reso=10; let nslist=[]; for(let i=0;i<reso;i++){nslist.push([Noise.noise(i*0.5), Noise.noise(i*0.5,0.5)]);} let canv=""; let blobs=""; let line1=[], line2=[]; let leafcol=col.includes("rgba(")?col.replace("rgba(","").replace(")","").split(","):["100","100","100","0.5"]; for(let i=0;i<reso;i++){let nx=x, ny=y-(i*hei)/reso; if(i>=reso/5){for(let j=0;j<(reso-i)*2;j++){let ox=Math.random()*wid*2* Math.log(50*((reso-i)/reso)+1)/3.95; blobs+=blob(nx+ox*randChoice([-1,1]), ny+(Math.random()-0.5)*wid, {len:ox*2, wid:Math.random()*6+3, ang:(Math.random()-0.5)*Math.PI/6, col:"rgba("+leafcol[0]+","+leafcol[1]+","+leafcol[2]+","+(Math.random()*0.2+parseFloat(leafcol[3])).toFixed(3)+")"});}} line1.push([nx+((nslist[i][0]-0.5)*wid-(wid/2))*(reso-i)/reso, ny]); line2.push([nx+((nslist[i][1]-0.5)*wid+(wid/2))*(reso-i)/reso, ny]);} canv+=poly(line1.concat(line2.reverse()),{fil:"white",str:col,wid:1.5}); canv+=blobs; return canv;}
};
</script>

<script id="Blob">
function blob(x,y,args){args=args||{}; let len=args.len||20, wid=args.wid||5, ang=args.ang||0, col=args.col||"rgba(200,200,200,0.9)"; let reso=20; let lalist=[]; for(let i=0;i<reso+1;i++){let p=(i/reso)*2; let xo=len/2-Math.abs(p-1)*len; let yo=(Math.sin(p*Math.PI)**0.5)*wid/2; lalist.push([xo,yo]);} let nslist=[]; let n0=Math.random()*10; for(let i=0;i<reso+1;i++) nslist.push(Noise.noise(i*0.05,n0)); loopNoise(nslist); let plist=[]; for(let i=0;i<lalist.length;i++){let ns=nslist[i]; let nx=x+Math.cos(lalist[i][1]+ang)*lalist[i][0]*ns; let ny=y+Math.sin(lalist[i][1]+ang)*lalist[i][0]*ns; plist.push([nx,ny]);} return poly(plist,{fil:col,str:col,wid:0});}
</script>

<script>
const canvasWidth=800, canvasHeight=600;
const container=document.getElementById("artContainer");
const refreshInterval=5000;

function clearCanvas(){container.innerHTML="";}

function randomHSL(baseHue, variation=30, sat=70, light=50){const hue=(baseHue+Math.random()*variation)%360; return `hsl(${hue},${sat}%,${light}%)`;}

// 核心生成函数
function generateArt(){
    Math.seed(Date.now());
    clearCanvas();
    // 背景
    const bg=document.createElementNS("http://www.w3.org/2000/svg","rect");
    bg.setAttribute("x",0); bg.setAttribute("y",0); bg.setAttribute("width",canvasWidth); bg.setAttribute("height",canvasHeight);
    bg.setAttribute("fill",randomHSL(200,40,60,50)); // 天空颜色
    container.appendChild(bg);
    // 树木
    for(let i=0;i<5;i++){
        const tx=Math.random()*canvasWidth*0.8+50;
        const ty=canvasHeight-50;
        const leafCol=randomHSL(120,40,60,40);
        const trunkCol=randomHSL(30,20,50,30);
        const svgTree=Tree.tree03(tx,ty,{col:leafCol,wid:5});
        const g=document.createElementNS("http://www.w3.org/2000/svg","g");
        g.innerHTML=svgTree;
        container.appendChild(g);
    }
}

generateArt();
setInterval(generateArt,refreshInterval);
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Procedural Generative Forest</title>

<style>

body{
margin:0;
background:#111;
overflow:hidden;
}

canvas{
display:block;
margin:auto;
background:#f4f2ed;
}

</style>

</head>

<body>

<canvas id="art"></canvas>

<script>

////////////////////////////////////////////////////
//////////////// RANDOM ENGINE /////////////////////
////////////////////////////////////////////////////

var Prng = new function(){

this.s = 1234
this.p = 999979
this.q = 999983
this.m = this.p*this.q

this.hash = function(x){

var y = btoa(JSON.stringify(x))
var z = 0

for(var i=0;i<y.length;i++){

z += y.charCodeAt(i)*Math.pow(128,i)

}

return z

}

this.seed = function(x){

if(x==undefined){
x = new Date().getTime()
}

var y=0
var z=0

function redo(){

y = (Prng.hash(x)+z)%Prng.m
z += 1

}

while(y%Prng.p==0 || y%Prng.q==0 || y==0 || y==1){

redo()

}

Prng.s = y

for(var i=0;i<10;i++){

Prng.next()

}

}

this.next = function(){

Prng.s = (Prng.s*Prng.s)%Prng.m
return Prng.s/Prng.m

}

}()

Math.random = function(){
return Prng.next()
}

Math.seed = function(x){
return Prng.seed(x)
}

////////////////////////////////////////////////////
//////////////// CANVAS ////////////////////////////
////////////////////////////////////////////////////

var canvas = document.getElementById("art")
var ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

////////////////////////////////////////////////////
//////////////// COLOR /////////////////////////////
////////////////////////////////////////////////////

function randColor(a0,a1){

a0=a0||0.4
a1=a1||0.9

var r=Math.floor(Math.random()*200+50)
var g=Math.floor(Math.random()*200+50)
var b=Math.floor(Math.random()*200+50)

var a=Math.random()*(a1-a0)+a0

return "rgba("+r+","+g+","+b+","+a+")"

}

////////////////////////////////////////////////////
//////////////// NOISE /////////////////////////////
////////////////////////////////////////////////////

var Noise = new function(){

var size = 4096
var perlin = []

for(var i=0;i<size;i++){
perlin[i]=Math.random()
}

this.noise=function(x){

var xi=Math.floor(x)
var xf=x-xi

var a=perlin[xi%size]
var b=perlin[(xi+1)%size]

return a*(1-xf)+b*xf

}

}()

////////////////////////////////////////////////////
//////////////// POLYGON ///////////////////////////
////////////////////////////////////////////////////

function poly(plist,args){

args=args||{}

var fil=args.fil||"rgba(0,0,0,0)"
var str=args.str||fil
var wid=args.wid||0

if(plist.length==0)return

ctx.beginPath()

ctx.moveTo(plist[0][0],plist[0][1])

for(var i=1;i<plist.length;i++){

ctx.lineTo(plist[i][0],plist[i][1])

}

ctx.closePath()

if(fil!="none"){

ctx.fillStyle=fil
ctx.fill()

}

if(wid>0){

ctx.strokeStyle=str
ctx.lineWidth=wid
ctx.stroke()

}

}

////////////////////////////////////////////////////
//////////////// LEAVES ////////////////////////////
////////////////////////////////////////////////////

function drawLeaves(x,y){

var n=4+Math.random()*6

for(var i=0;i<n;i++){

var ang=Math.random()*Math.PI*2
var len=10+Math.random()*15

var px=x+Math.cos(ang)*len
var py=y+Math.sin(ang)*len

poly([
[x,y],
[px+Math.random()*4,py+Math.random()*4],
[px-Math.random()*4,py-Math.random()*4]
],{
fil:randColor(0.4,0.7)
})

}

}

////////////////////////////////////////////////////
//////////////// TREE //////////////////////////////
////////////////////////////////////////////////////

function drawTree(x,y,height){

var seg=12

var pts=[]

for(var i=0;i<seg;i++){

var t=i/seg

var nx=x+Noise.noise(i)*20-10
var ny=y-t*height

pts.push([nx,ny])

}

poly(pts,{
str:randColor(0.5,0.8),
wid:2
})

for(var i=0;i<pts.length;i++){

drawLeaves(pts[i][0],pts[i][1])

}

}

////////////////////////////////////////////////////
//////////////// FOREST ////////////////////////////
////////////////////////////////////////////////////

function generateForest(){

ctx.fillStyle="#f4f2ed"
ctx.fillRect(0,0,canvas.width,canvas.height)

Math.seed(Date.now())

var count=20+Math.random()*40

for(var i=0;i<count;i++){

var x=Math.random()*canvas.width
var h=100+Math.random()*200

drawTree(x,canvas.height,h)

}

}

////////////////////////////////////////////////////
//////////////// SAVE //////////////////////////////
////////////////////////////////////////////////////

function saveImage(){

var link=document.createElement("a")

link.download="forest_"+Date.now()+".png"

link.href=canvas.toDataURL()

link.click()

}

////////////////////////////////////////////////////
//////////////// LOOP //////////////////////////////
////////////////////////////////////////////////////

generateForest()

setInterval(function(){

saveImage()

generateForest()

},6000)

</script>

</body>
</html>
